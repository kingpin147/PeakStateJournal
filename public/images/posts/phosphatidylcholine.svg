<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f0e0e"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="250" fill="#fca5a5" opacity="0.08" filter="url(#blur2)"/>
  <circle cx="1000" cy="480" r="200" fill="#fca5a5" opacity="0.1" filter="url(#blur2)"/>
  <circle cx="600" cy="315" r="300" fill="#fca5a5" opacity="0.04" filter="url(#blur1)"/>

  <!-- Grid lines subtle -->
  <g stroke="#fca5a5" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="120" fill="none" stroke="#fca5a5" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="1100" cy="80" r="80" fill="none" stroke="#fca5a5" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="100" cy="550" r="100" fill="none" stroke="#fca5a5" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#fca5a5" opacity="0.6"/>

  <!-- Content area -->
  <!-- Icon circle -->
  <circle cx="140" cy="315" r="64" fill="#fca5a5" opacity="0.12"/>
  <circle cx="140" cy="315" r="50" fill="#fca5a5" opacity="0.08"/>
  <text x="140" y="332" font-family="system-ui" font-size="44" text-anchor="middle" dominant-baseline="middle">🧬</text>

  <!-- Brand label top left -->
  <text x="80" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fca5a5" opacity="0.7" letter-spacing="3">PEAK STATE JOURNAL</text>
  <line x1="80" y1="62" x2="340" y2="62" stroke="#fca5a5" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Main title -->
  <text x="240" y="285" font-family="system-ui, -apple-system, Georgia, serif" font-size="56" font-weight="800" fill="white" opacity="0.95" letter-spacing="-0.5">Phosphatidyl-</text>
  <text x="240" y="350" font-family="system-ui, -apple-system, Georgia, serif" font-size="56" font-weight="800" fill="#fca5a5" opacity="0.9" letter-spacing="-0.5">choline</text>

  <!-- Subtitle line -->
  <text x="240" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" opacity="0.5" letter-spacing="1">Clinical Evidence-Based Research</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="black" opacity="0.3"/>
  <text x="80" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fca5a5" opacity="0.6" letter-spacing="2">peakstatejournal.com</text>
  <text x="1120" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.35" text-anchor="end">Evidence-Based · Peer-Reviewed</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="#fca5a5" opacity="0.4"/>
</svg>